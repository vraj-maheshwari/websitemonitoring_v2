{% extends "base.html" %}
{% block title %}Create Account - WebMonitor{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="card auth-card">
    <div class="section-head">
      <div>
        <div class="label">Account</div>
        <h1>Create account</h1>
      </div>
    </div>
    <form id="register-form" method="post" action="{{ url_for('web.register') }}" class="add-site-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required autofocus autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" type="password" name="confirm_password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
    </form>
    <p class="small muted" style="margin-top:16px;">
      Already have an account? <a href="{{ url_for('web.login') }}" class="val-blue">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('register-form');
  const password = document.getElementById('password');
  const confirm = document.getElementById('confirm_password');

  function validateMatch() {
    confirm.setCustomValidity(password.value === confirm.value ? '' : 'Passwords do not match');
  }

  password.addEventListener('input', validateMatch);
  confirm.addEventListener('input', validateMatch);
  form.addEventListener('submit', validateMatch);
});
</script>
{% endblock %}
