{% extends "base.html" %}
{% block title %}Create Account — Pulse{% endblock %}

{% block content %}
<div class="auth-shell">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#0891b2);box-shadow:0 0 24px rgba(20,184,166,.3);font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:14px;">P</div>
    <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-.03em;margin-bottom:6px;">Create your account</h1>
    <p style="font-size:.82rem;color:var(--text-3);">Start monitoring your websites in minutes</p>
  </div>

  <div class="card auth-card" style="padding:28px;">
    <form id="register-form" method="post" action="{{ url_for('web.register') }}" class="add-site-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" name="email" required autofocus autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--text-3);font-weight:400;">(min 8 characters)</span></label>
        <input id="password" type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="••••••••">
      </div>
      <div class="form-group" style="margin-bottom:18px;">
        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" type="password" name="confirm_password" required autocomplete="new-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px 16px;font-size:.85rem;">
        Create Account →
      </button>
    </form>
    <div style="border-top:1px solid var(--border);margin-top:20px;padding-top:16px;text-align:center;">
      <p style="font-size:.78rem;color:var(--text-3);">
        Already have an account? <a href="{{ url_for('web.login') }}" style="color:var(--accent);font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('register-form');
  const password = document.getElementById('password');
  const confirm = document.getElementById('confirm_password');

  function validateMatch() {
    confirm.setCustomValidity(password.value === confirm.value ? '' : 'Passwords do not match');
  }

  password.addEventListener('input', validateMatch);
  confirm.addEventListener('input', validateMatch);
  form.addEventListener('submit', validateMatch);
});
</script>
{% endblock %}
